
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #f8f5f1;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .invite-container {
    position: relative;
    transform: scale(1.3);
    transform-origin: center;
  }

  .invite {
    max-height: 95vh;
    display: block;

    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    border-radius: 12px;
  }

  /* Button */
  .open-btn {
    position: absolute;

    /* adjust position */
    bottom: 35%;
    left: 50%;
    transform: translateX(-50%);

    padding: 8px 18px;
    border: none;
    border-radius: 30px;

   background-color: #a08678; /* marrom claro */
   color: #ffffff;

    font-size: 10px;
    cursor: pointer;

    box-shadow: 0 4px 15px rgba(0,0,0,0.2);

    transition: 0.3s;
  }

  .open-btn:hover {
    background: white;
    transform: translateX(-50%) scale(1.05);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .invite-container {
      transform: scale(1);
    }

    .invite {
      max-width: 95vw;
      height: auto;
    }

    .open-btn {
      font-size: 16px;
      padding: 12px 22px;
      bottom: 32%;
    }
  }
</style>
</head>

<body>

  <div class="invite-container">

    <img class="invite" src="Convite1.png" alt="Wedding Invitation">

    <!-- Button -->
    <button class="open-btn"
      onclick="window.location.href='c_Silke.html'">
      Clique aqui para abrir
    </button>

  </div>

</body>
</html>
