

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../style.css">

<title>Invitation</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #f8f5f1;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .invite-container {
    position: relative;
    transform: scale(1.3);
    transform-origin: center;
  }

  .invite {
    max-height: 95vh;
    display: block;

    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    border-radius: 12px;
  }

  /* Text on top of image */
  .invite-text {
    position: absolute;

    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 80%;

    text-align: center;
    color: #6b4f3f;

    font-size: 20px;
    line-height: 1.2;
  }

  .invite-text h1 {
    margin-bottom: 0px;
    font-size: 35px;
    font-weight: 400;
    letter-spacing: 2px;
    line-height: 1.2;
    color: #7c7e50;
  }

  .invite-text nav {
  margin-bottom: 0px;
  font-size: 15px;
  letter-spacing: 0.3px;
  line-height: 1.2;
  color: #6b4f3f;
  }

  .bold-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    line-height: 1.2;
    color: #6b4f3f;
  }

  .invite-text nav.small-note {
    font-size: 12px;
    letter-spacing: 0.3px;
    color: #7a5c4d;
    line-height: 1.2;
  }


  /* Button */
  .open-btn {
  margin-top: 18px;

  padding: 8px 18px;
  border: none;
  border-radius: 30px;

  background-color: #a08678; /* marrom claro */
  color: #ffffff;

  font-size: 10px;
  cursor: pointer;

  transition: 0.3s;
  }

  .open-btn:hover {
    background: white;
    transform: scale(1.05);
  }

  /* Mobile */
  @media (max-width: 768px) {

    .invite-container {
      transform: scale(1);
    }

    .invite {
      transform: scale(1.08);
      transform-origin: center;
      max-width: 95vw;
      height: auto;
    }

    .invite-text {
      width: 85%;
    }

    .invite-text h1 {
      font-size: 28px;
    }

    .invite-text nav {
      font-size: 14px;
    }

    .invite-text .bold-text {
      font-size: 15px;
    }

    .invite-text .small-note {
      font-size: 12px;
    }

    .open-btn {
      font-size: 12px;
      padding: 8px 16px;
    }
  }

</style>
</head>

<body>

  <div class="invite-container">

    <img class="invite" src="Convite2.png" alt="Wedding Invitation">

    <div class="invite-text">
      <h1>Heloisa & Luis</h1>

      <nav>
        convidam <strong>Sarah e Pedro</strong> para o seu casamento dia
      </nav>

      <nav class="bold-text">
        21 de Fevereiro de 2027 às 11:00 h
      </nav>

      <nav class="small-note">
        Av. Angélica, 2278 - Consolação, São Paulo - SP, Brasil
      </nav>

    <!-- Button -->
    <button class="open-btn"
    onclick="window.location.href='../index.html'">
    Clique para Confirmar Presença
    </button>

    <nav class="small-note">
      Confirmar até dia 2 de Agosto de 2026
    </nav>

    </div>

  </div>

</body>
</html>
